<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lar Certo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:opsz,wght@18..144,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/querodoar1.css">
    <script src="js/querodoar.js"></script>
</head>
<body>
    <nav class="marca">
       <link rel="logo" href="img/image.png" Lar Certo
        </div>
        <div class="navbar-links">
            <a href="#">quem somos?</a>
            <a href="#">quero adotar</a>
            <a href="#">blog</a>
        </div>
        <div class="navbar-actions">
            <a href="#" class="donate">DOE E AJUDE</a>
            <a href="#">entrar</a>
            <a href="#">cadastrar</a>
        </div>
    </nav>
    <div class="menu-cards">
        <div class="menu-card">
            <img src="img/92666b7aaa33bfabfe4e9d62ec1749dbab28bf57.png" alt="Quero doar">
            <span>QUERO DOAR</span>
        </div>
        <div class="menu-card">
            <img src="img/d39a31c077f6cf3d94e82b52e7d9aba9205519ab.png" alt="Lares de adoção">
            <span>LARES DE ADOÇÃO</span>
        </div>
        <div class="menu-card">
            <img src="img/9239e72fdc0f4bde1a3935d4bf602b3f4033adec.png" alt="Blog">
            <span>BLOG</span>
        </div>
        <div class="menu-card">
            <img src="img/cdfbe98809e57b0c923fe7c6894a03d3e6e61b2d.png" alt="ONGs">
            <span>ONGS</span>
        </div>
        <div class="menu-card">
            <img src="img/a29c55e72a2ec8f9829a5229902f52e4f36cc519.png" alt="Perdi um pet">
            <span>PERDI UM PET</span>
        </div>
        <div class="form-wrapper"></div>
            <div class="form-container">
                <form>
                    <div class="form-image-upload">
                        <div class="form-image-preview" id="imagePreview">
                            <span style="color:#aaa;">Foto do Pet</span>
                        </div>
                        <label for="petImage">Escolher foto</label>
                        <input type="file" id="petImage" accept="image/*" onchange="previewImage(event)">
                    </div>
                    <div class="form-group">
                        <label for="petType">Tipo do Pet</label>
                        <select id="petType" required>
                            <option value="">Selecione</option>
                            <option value="cachorro">Cachorro</option>
                            <option value="gato">Gato</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petName">Nome do Pet</label>
                        <input type="text" id="petName" placeholder="Digite o nome do pet" required>
                    </div>
                    <div class="form-group">
                        <label for="petAge">Idade do Pet</label>
                        <input type="text" id="petAge" placeholder="Ex: 2 anos" required>
                    </div>
                    <div class="form-group">
                        <label for="petSex">Sexo</label>
                        <select id="petSex" required>
                            <option value="">Selecione</option>
                            <option value="macho">Macho</option>
                            <option value="femea">Fêmea</option>
                            <option value="nao_sabe">Não sei</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petSize">Porte</label>
                        <select id="petSize">
                            <option value="">Selecione</option>
                            <option value="pequeno">Pequeno</option>
                            <option value="medio">Médio</option>
                            <option value="grande">Grande</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petBreed">Raça do Pet <span style="color:#888;font-weight:400;">(opcional)</span></label>
                        <input type="text" id="petBreed" placeholder="Digite a raça do pet">
                    </div>
                    <div class="form-group">
                        <label for="petVaccinated">Vacinado?</label>
                        <select id="petVaccinated">
                            <option value="">Selecione</option>
                            <option value="sim">Sim</option>
                            <option value="nao">Não</option>
                            <option value="nao_sabe">Não sei</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petCastrated">Castrado?</label>
                        <select id="petCastrated">
                            <option value="">Selecione</option>
                            <option value="sim">Sim</option>
                            <option value="nao">Não</option>
                            <option value="nao_sabe">Não sei</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petOrigin">Era seu ou encontrou?</label>
                        <select id="petOrigin" required>
                            <option value="">Selecione</option>
                            <option value="meu">Era meu</option>
                            <option value="encontrei">Encontrei</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petLocation">Localização</label>
                        <input type="text" id="petLocation" placeholder="Cidade/Bairro" required>
                    </div>
                    <div class="form-group">
                        <label for="petDescription">Descrição do Pet</label>
                        <textarea id="petDescription" rows="3" placeholder="Conte mais sobre o pet (temperamento, necessidades, etc)" style="width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid #d1d1d1;background:#f3f3f3;font-size:15px;font-family:inherit;"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="contact">Contato para adoção</label>
                        <input type="text" id="contact" placeholder="WhatsApp, telefone ou e-mail" required>
                    </div>
                    <button type="submit" class="form-submit">Enviar!</button>
                </form>
            </div>
    </div>
</body>
</html>
</div>
